name: SonarQube Analysis

on:
  pull_request:
    branches: [ "master" ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to analyze'
        required: true
permissions:
  contents: read

jobs:
  sonar:
    name: SonarQube Scan
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required by SonarQube for precise blame/history info

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.x'

      - name: Install SonarQube Scanner for .NET
        shell: powershell
        run: |
          dotnet tool install --global dotnet-sonarscanner

      - name: Build and Analyze
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub Actions
        run: |
          # 1. Start the Sonar Scanner
          # Replace 'jatansisodiya_Transaction-Sql-Crud-Operation' with your SonarQube/SonarCloud Project Key.
          # Replace 'jatansisodiya' with your SonarCloud Organization Key (if using SonarCloud).
          # For self-hosted SonarQube, specify /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" instead.
          
          dotnet-sonarscanner begin /k:"jatansisodiya_Transaction-Sql-Crud-Operation" `
                                    /o:"jatansisodiya" `
                                    /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
                                    /d:sonar.host.url="https://sonarcloud.io"

          # 2. Build the application
          dotnet build --configuration Release

          # 3. Complete analysis
          dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"